<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="sphere" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0" stop-color="#5390e3"/>
      <stop offset="0.26" stop-color="#2f67cc"/>
      <stop offset="0.52" stop-color="#1a3f8c"/>
      <stop offset="0.76" stop-color="#0e2452"/>
      <stop offset="1" stop-color="#07142e"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.30" cy="0.28" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shadow" cx="0.82" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ball">
      <circle cx="512" cy="512" r="500"/>
    </clipPath>
  </defs>

  <!-- sphere body -->
  <circle cx="512" cy="512" r="500" fill="url(#sphere)"/>

  <g clip-path="url(#ball)">
    <!-- depth shadow on right -->
    <circle cx="512" cy="512" r="500" fill="url(#shadow)"/>

    <!-- teal pupil -->
    <circle cx="516" cy="552" r="90" fill="#14585a"/>

    <!-- dark navy band right of the lens -->
    <path d="M560 180
             C 600 360, 600 664, 560 844
             C 520 664, 520 360, 560 180 Z"
          fill="#0a1c45"/>

    <!-- white lens / iris -->
    <path d="M505 168
             C 470 360, 470 664, 505 856
             C 540 664, 540 360, 505 168 Z"
          fill="#ffffff"/>

    <!-- glossy highlight on top-left -->
    <circle cx="512" cy="512" r="500" fill="url(#gloss)"/>
  </g>
</svg>
